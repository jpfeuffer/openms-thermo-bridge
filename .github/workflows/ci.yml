name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Configure
        shell: bash
        run: |
          cmake -S "${GITHUB_WORKSPACE}" -B "${GITHUB_WORKSPACE}/build" \
            -DOPENMS_THERMO_BRIDGE_ENABLE_VENDOR_DOWNLOAD=ON \
            -DOPENMS_THERMO_BRIDGE_DOWNLOAD_TEST_DATA=ON

      - name: Build
        shell: bash
        run: cmake --build "${GITHUB_WORKSPACE}/build" --config Release --parallel

      - name: Run tests
        shell: bash
        run: ctest --test-dir "${GITHUB_WORKSPACE}/build" --build-config Release --output-on-failure

      - name: Install package
        shell: bash
        run: cmake --install "${GITHUB_WORKSPACE}/build" --config Release --prefix "${GITHUB_WORKSPACE}/install"
